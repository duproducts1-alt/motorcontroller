name: Build Motorconfig Firmware

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install ARM GCC Toolchain
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      with:
        release: '13.2.Rel1'

    - name: Build motorconfig firmware
      working-directory: firmware/motorconfig
      run: make -j$(nproc)

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: motorconfig-firmware
        path: |
          firmware/motorconfig/*.elf
          firmware/motorconfig/*.bin
          firmware/motorconfig/*.hex
